name: Monthly Restore Drill

on:
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:

jobs:
  drill:
    name: Download → decrypt → restore → verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: drillpass
          POSTGRES_DB: drill
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        # Fail fast on missing secrets — same reasoning as the nightly
        # backup workflow. An untested-restore is just as silent.
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          missing=()
          for var in BACKUP_ENCRYPTION_KEY S3_BUCKET AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY RESEND_API_KEY; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Restore-drill secrets missing — set them via 'gh secret set <NAME>' before this workflow can succeed:"
            for m in "${missing[@]}"; do echo "  - $m"; done
            exit 1
          fi

      - name: Install Postgres 17 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # pgdg installs versioned binaries at /usr/lib/postgresql/17/bin.
          # Prepend to PATH so `pg_restore` resolves to v17, not Ubuntu's stock v16.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_restore --version

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run restore drill
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ca-central-1
          DRILL_DATABASE_URL: postgres://postgres:drillpass@localhost:5432/drill
        run: pnpm tsx scripts/restore-test.ts

      - name: Alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPS_ALERTS_TO_EMAIL: ${{ secrets.OPS_ALERTS_TO_EMAIL }}
          OPS_ALERTS_FROM_EMAIL: ${{ secrets.OPS_ALERTS_FROM_EMAIL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsSL -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"${OPS_ALERTS_FROM_EMAIL:-ops@mail.heyhenry.io}\",\"to\":[\"${OPS_ALERTS_TO_EMAIL:-riffninjavideos@gmail.com}\"],\"subject\":\"[HeyHenry] Monthly restore drill FAILED\",\"text\":\"Restore drill failed — untested backups are no backups. Run: ${RUN_URL}\"}"
