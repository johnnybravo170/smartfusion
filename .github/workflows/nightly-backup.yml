name: Nightly Backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    name: pg_dump → encrypt → S3
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        # Fail fast with a clear list of what's missing rather than
        # waiting for pg_dump to error on a unix socket. Backups silently
        # broken for days are the worst possible outcome here.
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          missing=()
          for var in BACKUP_DATABASE_URL BACKUP_ENCRYPTION_KEY S3_BUCKET AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY RESEND_API_KEY; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Backup secrets missing — set them via 'gh secret set <NAME>' before this workflow can succeed:"
            for m in "${missing[@]}"; do echo "  - $m"; done
            exit 1
          fi

      - name: Install Postgres 17 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # pgdg installs versioned binaries at /usr/lib/postgresql/17/bin.
          # Prepend to PATH so `pg_dump` resolves to v17, not Ubuntu's stock v16.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump, encrypt, upload
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ca-central-1
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          DUMP="heyhenry-${STAMP}.dump"
          ENC="${DUMP}.enc"

          pg_dump \
            --format=custom \
            --no-owner \
            --no-acl \
            --clean \
            --if-exists \
            --file="${DUMP}" \
            "${BACKUP_DATABASE_URL}"

          openssl enc -aes-256-cbc -pbkdf2 -iter 100000 -salt \
            -in "${DUMP}" \
            -out "${ENC}" \
            -pass env:BACKUP_ENCRYPTION_KEY

          SIZE=$(stat -c%s "${ENC}")
          echo "Encrypted dump: ${ENC} (${SIZE} bytes)"

          aws s3 cp "${ENC}" "s3://${S3_BUCKET}/daily/${ENC}"

          echo "BACKUP_OBJECT=daily/${ENC}" >> "$GITHUB_ENV"
          echo "BACKUP_SIZE=${SIZE}" >> "$GITHUB_ENV"

      - name: Alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPS_ALERTS_TO_EMAIL: ${{ secrets.OPS_ALERTS_TO_EMAIL }}
          OPS_ALERTS_FROM_EMAIL: ${{ secrets.OPS_ALERTS_FROM_EMAIL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsSL -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"${OPS_ALERTS_FROM_EMAIL:-ops@mail.heyhenry.io}\",\"to\":[\"${OPS_ALERTS_TO_EMAIL:-riffninjavideos@gmail.com}\"],\"subject\":\"[HeyHenry] Nightly backup FAILED\",\"text\":\"Nightly backup workflow failed. Run: ${RUN_URL}\"}"
